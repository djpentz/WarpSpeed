name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build WarpSpeed.app
        run: ./scripts/build.sh

      - name: Zip the app bundle
        run: ditto -c -k --sequesterRsrc --keepParent build/WarpSpeed.app build/WarpSpeed.app.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/WarpSpeed.app.zip
          generate_release_notes: true
